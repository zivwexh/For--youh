<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I luvv youhh 💗</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Comic Sans MS', cursive;
      overflow: hidden;
    }
    .container { text-align: center; z-index: 10; }
    
    /* PINK + GOLD LUXURY BOX */
    .gift-box {
      width: 200px;
      height: 200px;
      background: linear-gradient(145deg, #ff69b4, #ff1493);
      border-radius: 12px;
      position: relative;
      margin: 0 auto 20px;
      box-shadow: 
        0 15px 35px rgba(255, 20, 147, 0.4),
        inset 0 -8px 0 rgba(0,0,0,0.1),
        inset 0 2px 0 rgba(255,255,255,0.3);
      cursor: pointer;
      transition: 0.3s;
    }
    .gift-box:hover { transform: scale(1.05); }
    .gift-box::before {
      content: '';
      position: absolute;
      width: 30px;
      height: 200px;
      background: linear-gradient(180deg, #ffd700, #ffb700, #ffd700);
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
    }
    .gift-box::after {
      content: '';
      position: absolute;
      width: 200px;
      height: 30px;
      background: linear-gradient(90deg, #ffd700, #ffb700, #ffd700);
      top: 50%;
      transform: translateY(-50%);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
    }
    .gift-bow {
      position: absolute;
      width: 60px;
      height: 60px;
      background: radial-gradient(circle, #ffd700, #ffb700);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.5);
      z-index: 10;
    }
    .gift-bow::before, .gift-bow::after {
      content: '';
      position: absolute;
      width: 40px;
      height: 50px;
      background: #ffd700;
      border-radius: 50%;
      top: 5px;
    }
    .gift-bow::before { left: -20px; transform: rotate(-30deg); }
    .gift-bow::after { right: -20px; transform: rotate(30deg); }
    
    .tap-text {
      color: #ff69b4;
      font-size: 18px;
      margin-top: 10px;
      animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    
    /* TEDDY REVEAL */
    .surprise {
      display: none;
      animation: popIn 0.8s ease-out;
    }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .teddy-img {
      width: 180px;
      height: 180px;
      object-fit: contain;
      filter: drop-shadow(0 0 25px rgba(255,105,180,0.8));
      margin-bottom: 15px;
    }
    .love-text {
      font-size: 42px;
      color: #ff69b4;
      text-shadow: 0 0 20px #ff1493;
      animation: glow 2s infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 20px #ff1493; }
      to { text-shadow: 0 0 35px #ff1493, 0 0 50px #ff69b4; }
    }
    
    /* HEART MAZHA */
    .heart {
      position: fixed;
      top: -10px;
      color: #ff69b4;
      animation: fall linear forwards;
      z-index: 1;
      pointer-events: none;
    }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="gift-box" onclick="openGift()">
      <div class="gift-bow"></div>
    </div>
    <div class="tap-text">Tap the gift Youhh 💗</div>
    
    <div class="surprise" id="surprise">
      <!-- NJAN THARUNNA WHITE TEDDY -->
      <img src="https://i.ibb.co/6bQzX8Z/white-teddy-bear.png" alt="teddy" class="teddy-img">
      <div class="love-text">I luvv youhh 💕</div>
    </div>
  </div>

  <!-- PIANO MUSIC -->
  <audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2b1d8a8f7b.mp3" type="audio/mpeg">
  </audio>

  <script>
    function openGift() {
      document.querySelector('.gift-box').style.display = 'none';
      document.querySelector('.tap-text').style.display = 'none';
      document.getElementById('surprise').style.display = 'block';
      document.getElementById('bgMusic').play();
      startHeartMazha();
    }
    
    // MAZHA POLE HEART
    function startHeartMazha() {
      setInterval(() => {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = '💗';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = Math.random() * 22 + 15 + 'px';
        heart.style.animationDuration = Math.random() * 2 + 1 + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 3000);
      }, 70); // ← Mazha speed
    }
  </script>
</body>
    </html>
