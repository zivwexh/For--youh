<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Do you love me? 💜</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a0d2e;
      height: 100vh; display: flex; justify-content: center; align-items: center;
      font-family: 'Georgia', serif; overflow: hidden;
    }
    .container { text-align: center; position: relative; width: 100%; height: 100vh; }
    
    .question-box {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    
    .bears {
      font-size: 120px; margin-bottom: 20px;
      filter: drop-shadow(0 0 20px rgba(196, 181, 253, 0.8));
    }
    
    .question {
      font-size: 35px; color: #c4b5fd; margin-bottom: 30px;
      text-shadow: 0 0 15px rgba(196, 181, 253, 0.8);
    }
    
    .buttons {
      display: flex; gap: 20px; justify-content: center;
    }
    
    .btn {
      padding: 15px 40px; font-size: 20px; border: none;
      border-radius: 15px; cursor: pointer; transition: 0.3s;
      font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    
    .yes-btn {
      background: linear-gradient(145deg, #8b5cf6, #7c3aed);
      color: white;
    }
    .yes-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px rgba(139, 92, 246, 0.8);
    }
    
    .no-btn {
      background: #ffffff; color: #7c3aed;
      position: relative;
    }
    
    .surprise { display: none; }
    .surprise-text {
      font-size: 45px; color: #ff69b4;
      text-shadow: 0 0 25px #ff1493;
      animation: popIn 0.5s ease-out;
    }
    @keyframes popIn {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }
    
    /* FLOATING HEARTS */
    .heart {
      position: fixed; top: -10px; 
      animation: fall linear forwards; z-index: 1;
    }
    .heart::before { content: '💜'; font-size: inherit; }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="question-box" id="questionBox">
      <div class="bears">🤍🤎</div>
      <div class="question">Do you love me?</div>
      <div class="buttons">
        <button class="btn yes-btn" onclick="yesClicked()">Yes</button>
        <button class="btn no-btn" id="noBtn">No</button>
      </div>
    </div>
    
    <div class="surprise" id="surprise">
      <div class="bears">🤍💜🤎</div>
      <div class="surprise-text">I knew it! 💜</div>
    </div>
  </div>

  <!-- SONG TUNE - CAN'T HELP FALLING IN LOVE PIANO -->
  <audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_2b0c7b3b2a.mp3" type="audio/mpeg">
  </audio>

  <script>
    const noBtn = document.getElementById('noBtn');
    const questionBox = document.getElementById('questionBox');
    
    // NO BUTTON ODUM MA 😂
    noBtn.addEventListener('mouseover', () => {
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 100);
      noBtn.style.position = 'fixed';
      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
    });
    
    // YES CLICK CHEYYUMBO
    function yesClicked() {
      questionBox.style.display = 'none';
      document.getElementById('surprise').style.display = 'block';
      document.getElementById('bgMusic').play().catch(e => {});
      startHeartRain();
    }
    
    // HEART MAZHA
    function startHeartRain() {
      setInterval(() => {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = Math.random() * 25 + 15 + 'px';
        heart.style.animationDuration = Math.random() * 2 + 2 + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 4000);
      }, 100);
    }
  </script>
</body>
  </html>
