<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tap the gift Youhh 💜</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(circle at center, #1a0d2e, #0a0a15);
      height: 100vh; display: flex; justify-content: center; align-items: center;
      font-family: 'Brush Script MT', cursive; overflow: hidden;
    }
    .container { text-align: center; z-index: 10; }
    
    /* FLAT PURPLE BOX - NAMLDE COMBO */
    .gift-box {
      width: 240px; height: 160px;
      background: linear-gradient(145deg, #8b5cf6, #7c3aed);
      border-radius: 15px; position: relative; margin: 0 auto 25px;
      cursor: pointer; transition: 0.3s;
      box-shadow: 
        0 0 40px rgba(139, 92, 246, 0.8),
        0 0 80px rgba(139, 92, 246, 0.4),
        0 12px 30px rgba(0,0,0,0.5);
    }
    .gift-box:hover { 
      transform: scale(1.03);
      box-shadow: 
        0 0 60px rgba(139, 92, 246, 1),
        0 0 100px rgba(139, 92, 246, 0.6),
        0 18px 40px rgba(0,0,0,0.6);
    }
    
    /* WHITE RIBBON - VERTICAL */
    .gift-box::before {
      content: ''; position: absolute; width: 40px; height: 160px;
      background: #ffffff;
      left: 50%; transform: translateX(-50%);
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.9);
      z-index: 2; filter: blur(0.5px);
    }
    
    /* WHITE RIBBON - HORIZONTAL */
    .gift-box::after {
      content: ''; position: absolute; width: 240px; height: 40px;
      background: #ffffff;
      top: 50%; transform: translateY(-50%);
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.9);
      z-index: 2; filter: blur(0.5px);
    }
    
    .tap-text {
      color: #c4b5fd; font-size: 24px; margin-top: 15px;
      font-style: italic; text-shadow: 0 0 15px rgba(196, 181, 253, 0.8);
    }
    
    .surprise { display: none; animation: popIn 1s ease-out; }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .teddy {
      font-size: 160px; 
      filter: drop-shadow(0 0 35px rgba(196, 181, 253, 0.9));
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform: translateY(0);} 50%{transform: translateY(-15px);} }
    
    .love-text {
      font-size: 45px; color: #ff69b4;
      text-shadow: 0 0 25px #ff1493, 0 0 40px #ff69b4;
      animation: glow 2s infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 25px #ff1493; }
      to { text-shadow: 0 0 40px #ff1493, 0 0 60px #ff69b4; }
    }
    
    /* PINK HEART MAZHA */
    .heart {
      position: fixed; top: -10px; color: #ff69b4;
      animation: fall linear forwards; z-index: 1; pointer-events: none;
    }
    .heart::before { content: '💗'; font-size: inherit; }
    .heart:nth-child(2n)::before { content: '💕'; }
    .heart:nth-child(3n)::before { content: '💖'; }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="gift-box" onclick="openGift()"></div>
    <div class="tap-text">Tap the gift Youhh 💜</div>
    
    <div class="surprise" id="surprise">
      <div class="teddy">🧸</div>
      <div class="love-text">I luvv youhh 💗</div>
    </div>
  </div>

  <!-- PRETTY LITTLE BABY - PIANO VERSION -->
  <audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2023/05/04/audio_5591f6f2e3.mp3" type="audio/mpeg">
  </audio>

  <script>
    function openGift() {
      document.querySelector('.gift-box').style.display = 'none';
      document.querySelector('.tap-text').style.display = 'none';
      document.getElementById('surprise').style.display = 'block';
      document.getElementById('bgMusic').play().catch(e => {});
      startHeartMazha();
    }
    
    function startHeartMazha() {
      setInterval(() => {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = Math.random() * 25 + 18 + 'px';
        heart.style.animationDuration = Math.random() * 2 + 2 + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 4000);
      }, 80);
    }
  </script>
</body>
  </html>
