<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I luvv youhh 💜</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d15;
      height: 100vh; display: flex; justify-content: center; align-items: center;
      font-family: 'Comic Sans MS', cursive; overflow: hidden;
    }
    .container { text-align: center; z-index: 10; }
    
    /* PURPLE + WHITE LUXURY BOX */
    .gift-box {
      width: 220px; height: 220px;
      background: linear-gradient(145deg, #8a2be2, #6a0dad, #9370db);
      border-radius: 15px; position: relative; margin: 0 auto 20px;
      cursor: pointer; transition: 0.4s;
      box-shadow: 
        0 20px 40px rgba(138, 43, 226, 0.5),
        0 5px 15px rgba(0,0,0,0.3),
        inset 0 -12px 0 rgba(0,0,0,0.15),
        inset 0 3px 0 rgba(255,255,255,0.4);
      transform: perspective(800px) rotateX(10deg);
    }
    .gift-box:hover { 
      transform: perspective(800px) rotateX(10deg) scale(1.08) rotateZ(2deg);
      box-shadow: 
        0 25px 50px rgba(138, 43, 226, 0.7),
        0 8px 20px rgba(0,0,0,0.4),
        inset 0 -12px 0 rgba(0,0,0,0.15),
        inset 0 3px 0 rgba(255,255,255,0.5);
    }
    
    /* WHITE RIBBON - VERTICAL */
    .gift-box::before {
      content: ''; position: absolute; width: 40px; height: 220px;
      background: linear-gradient(180deg, #ffffff, #f0f0f0, #ffffff);
      left: 50%; transform: translateX(-50%);
      box-shadow: 
        0 0 20px rgba(255, 255, 255, 0.8),
        inset 2px 0 5px rgba(255,255,255,0.8),
        inset -2px 0 5px rgba(0,0,0,0.1);
      z-index: 2;
    }
    
    /* WHITE RIBBON - HORIZONTAL */
    .gift-box::after {
      content: ''; position: absolute; width: 220px; height: 40px;
      background: linear-gradient(90deg, #ffffff, #f0f0f0, #ffffff);
      top: 50%; transform: translateY(-50%);
      box-shadow: 
        0 0 20px rgba(255, 255, 255, 0.8),
        inset 0 2px 5px rgba(255,255,255,0.8),
        inset 0 -2px 5px rgba(0,0,0,0.1);
      z-index: 2;
    }
    
    /* WHITE BOW */
    .gift-bow {
      position: absolute; width: 80px; height: 80px;
      top: -35px; left: 50%; transform: translateX(-50%); z-index: 10;
      background: radial-gradient(circle, #f8f8f8, #ffffff);
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.9),
        inset 2px 2px 6px rgba(255,255,255,0.9);
    }
    .gift-bow::before {
      content: ''; position: absolute; width: 45px; height: 60px;
      background: linear-gradient(135deg, #ffffff, #f0f0f0);
      border-radius: 50% 40% 50% 40%; left: -5px; top: 10px;
      transform: rotate(-35deg);
      box-shadow: 0 5px 15px rgba(255, 255, 255, 0.6),
        inset 3px 3px 8px rgba(255,255,255,0.9),
        inset -2px -2px 5px rgba(0,0,0,0.1);
    }
    .gift-bow::after {
      content: ''; position: absolute; width: 45px; height: 60px;
      background: linear-gradient(225deg, #ffffff, #f0f0f0);
      border-radius: 40% 50% 40% 50%; right: -5px; top: 10px;
      transform: rotate(35deg);
      box-shadow: 0 5px 15px rgba(255, 255, 255, 0.6),
        inset 3px 3px 8px rgba(255,255,255,0.9),
        inset -2px -2px 5px rgba(0,0,0,0.1);
    }
    
    .tap-text {
      color: #b19cd9; font-size: 18px; margin-top: 10px;
      animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    
    .surprise { display: none; animation: popIn 0.8s ease-out; }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    /* WHITE TEDDY */
    .teddy {
      font-size: 140px; 
      filter: drop-shadow(0 0 25px rgba(177, 156, 217, 0.8));
      margin-bottom: 15px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform: translateY(0);} 50%{transform: translateY(-10px);} }
    
    .love-text {
      font-size: 42px; color: #b19cd9;
      text-shadow: 0 0 20px #8a2be2;
      animation: glow 2s infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 20px #8a2be2; }
      to { text-shadow: 0 0 35px #8a2be2, 0 0 50px #9370db; }
    }
    
    /* HEART MAZHA - PURPLE */
    .heart {
      position: fixed; top: -10px; color: #b19cd9;
      animation: fall linear forwards; z-index: 1; pointer-events: none;
    }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="gift-box" onclick="openGift()">
      <div class="gift-bow"></div>
    </div>
    <div class="tap-text">Tap the gift Youhh 💜</div>
    
    <div class="surprise" id="surprise">
      <div class="teddy">🧸</div>
      <div class="love-text">I luvv youhh 💜</div>
    </div>
  </div>

  <!-- ROMANTIC PIANO MUSIC -->
  <audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2021/11/01/audio_00fa5593f3.mp3" type="audio/mpeg">
  </audio>

  <script>
    function openGift() {
      document.querySelector('.gift-box').style.display = 'none';
      document.querySelector('.tap-text').style.display = 'none';
      document.getElementById('surprise').style.display = 'block';
      document.getElementById('bgMusic').play().catch(e => {});
      startHeartMazha();
    }
    
    // MAZHA POLE HEART - PURPLE
    function startHeartMazha() {
      setInterval(() => {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = '💜';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = Math.random() * 22 + 15 + 'px';
        heart.style.animationDuration = Math.random() * 2 + 1 + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 3000);
      }, 60); // Super mazha speed
    }
  </script>
</body>
  </html>
